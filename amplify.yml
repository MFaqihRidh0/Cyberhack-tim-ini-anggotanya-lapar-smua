version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - bash -c 'cd frontend && npm install'
    build:
      commands:
        - nvm use 20
        - bash -c 'cd frontend && npx prisma generate && npm run build'
  artifacts:
    baseDirectory: frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**
      - frontend/.next/cache/**
